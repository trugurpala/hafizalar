<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hafizalar product builder flow</title>
  <desc id="desc">A visual summary of Hafizalar turning a short request into inspected, verified software.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="#ffffff" stroke="#d4d4d8" stroke-width="2"/>
  <text x="92" y="132" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">Hafizalar</text>
  <text x="96" y="182" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">Reusable product-builder memory for Codex and ChatGPT</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="96" y="258" width="190" height="86" rx="18" fill="#e9f5ff" stroke="#2563eb" stroke-width="3"/>
    <text x="132" y="310" fill="#0f172a">ChatGPT</text>
    <rect x="376" y="258" width="190" height="86" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
    <text x="432" y="310" fill="#0f172a">Codex</text>
    <rect x="656" y="258" width="190" height="86" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
    <text x="704" y="310" fill="#0f172a">Verify</text>
    <rect x="936" y="258" width="150" height="86" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="978" y="310" fill="#0f172a">Report</text>
  </g>
  <g stroke="#64748b" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M292 301 H360"/>
    <path d="M572 301 H640"/>
    <path d="M852 301 H920"/>
  </g>
  <g fill="#64748b">
    <path d="M360 301 L344 291 V311 Z"/>
    <path d="M640 301 L624 291 V311 Z"/>
    <path d="M920 301 L904 291 V311 Z"/>
  </g>
  <text x="96" y="438" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">short request -&gt; inspect -&gt; implement -&gt; verify -&gt; evidence</text>
  <text x="96" y="494" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Instruction explains. Skill executes. MCP connects. Hook/CI/Gate blocks. Evidence proves.</text>
  <text x="96" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">github.com/trugurpala/hafizalar</text>
</svg>
